# Server Configuration
server.port=8081
spring.application.name=order-service
spring.profiles.active=local

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/food_order_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ActiveMQ JMS Broker Configuration
spring.activemq.broker-url=tcp://localhost:61616
spring.activemq.user=admin
spring.activemq.password=admin
spring.activemq.packages.trust-all=true
# Use queues instead of topics for point-to-point communication by default
spring.jms.pub-sub-domain=false

# Subservice Integration Enpoints
integration.payment.url=http://localhost:8082/api/payments
integration.kitchen.url=http://localhost:8083/api/kitchen/tickets
integration.delivery.url=http://localhost:8084/api/deliveries

# Camunda Engine Configuration
camunda.bpm.database.schema-update=true
camunda.bpm.job-execution.enabled=true
camunda.bpm.auto-deployment-enabled=true
camunda.bpm.deployment-resource-pattern=classpath*:**/*.bpmn
# Automatically create admin user on startup
camunda.bpm.admin-user.id=admin
camunda.bpm.admin-user.password=admin
camunda.bpm.admin-user.first-name=System
camunda.bpm.generic-properties.properties.historyTimeToLive=1
camunda.bpm.admin-user.last-name=Administrator
camunda.bpm.admin-user.email=admin@foodordersystem.com
